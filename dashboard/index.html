<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>monitor-agent</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"></noscript>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=1">
  <link rel="stylesheet" href="wilson.css?v=1">
  <link rel="stylesheet" href="tool-timeline.css?v=1">
  <link rel="stylesheet" href="page-nav.css?v=1">
</head>
<body data-page="agent">

<header>
  <span class="brand-wilson">Wilson</span>
  <h1 class="page-nav-title" id="page-nav-title" title="monitor-usage 페이지로 전환 — 클릭">monitor-agent</h1>
  <button class="theme-switch" id="theme-switch" title="테마 전환 (Beige / White / Dark)">Beige</button>
</header>

<main>
  <div id="wilson-panel" class="wilson-state-waiting">
    <div class="wilson-character">
      <div class="wilson-svg-wrap" id="wilson-svg-wrap"></div>
      <div class="wilson-bubble" id="wilson-bubble"></div>
    </div>
    <div class="wilson-tool-timeline" id="wilson-tool-timeline">
      <div class="timeline-header">
        <span class="timeline-title">Tool Timeline</span>
        <div class="timeline-ranges" id="timeline-ranges" role="group" aria-label="time window">
          <button type="button" class="timeline-range" data-range="60000" title="1-minute window">1m</button>
          <button type="button" class="timeline-range" data-range="300000" title="5-minute window">5m</button>
          <button type="button" class="timeline-range" data-range="600000" title="10-minute window">10m</button>
        </div>
        <span class="timeline-count" id="timeline-count" title="running / total">0/0</span>
        <button class="timeline-clear" id="timeline-clear" title="Clear all icons">✕</button>
      </div>
      <div class="timeline-track" id="timeline-track"></div>
      <div class="timeline-axis" id="timeline-axis">
        <span>now</span><span>-1m</span><span>-2m</span><span>-5m</span><span>-10m</span>
      </div>
    </div>
    <div class="wilson-recent">
      <div class="wilson-recent-header">Recent Files</div>
      <div class="wilson-recent-list" id="wilson-recent-list"></div>
    </div>
  </div>

  <div class="main-content">
    <div class="activity-panel">
      <h2>Feeds</h2>
      <div class="activity-search"><input type="text" id="activity-search" placeholder="Search (prompts, files, commands...)"></div>
      <div class="session-filters" id="session-filters">
        <button class="fold-btn" id="toggle-all" title="Expand/Collapse all">▶ All</button>
        <div class="fold-divider"></div>
      </div>
      <div class="activity-list" id="activity-list"></div>
    </div>

    <div class="resize-handle" id="resize-activity"></div>
    <div class="content-panel">
      <div class="code-viewer">
        <div class="code-header">
          <span class="code-filename" id="code-filename">Select a file</span>
          <span class="code-info" id="code-info"></span>
        </div>
        <div class="code-content" id="code-content">
          <div class="code-placeholder">
            <span class="code-placeholder-icon">{ }</span>
            Click a file in Feeds to view its code
            <span class="code-placeholder-sub">Click any Read, Write, or Edit item</span>
          </div>
        </div>
      </div>

      <div class="diff-panel" id="diff-panel">
        <div class="diff-header">
          <span id="diff-filename">Diff</span>
          <span class="code-info" id="diff-time"></span>
        </div>
        <div class="diff-content" id="diff-content"><span style="color: var(--text-dim)">Click an Edit item to see changes</span></div>
      </div>

      <div class="browser-viewer" id="browser-viewer">
        <div class="browser-header">
          <span>Browser View</span>
          <span class="code-info" id="screenshot-time"></span>
        </div>
        <div class="browser-content" id="browser-content">
          <span style="color: var(--text-dim)">Waiting for screenshot...</span>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div>
    <span class="connection-dot disconnected" id="connection-dot"></span>
    <span id="connection-status">Connecting...</span>
  </div>
  <span id="event-count" style="color: var(--text-dim); font-size: var(--text-xs);"></span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-jsx.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-tsx.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-csharp.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-go.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-rust.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-powershell.min.js" defer></script>
<script src="tooltip.js?v=1"></script>
<script src="session-tag.js?v=1"></script>
<script src="feed.js?v=1"></script>
<script src="viewer.js?v=1"></script>
<script src="wilson.js?v=1"></script>
<script src="tool-timeline.js?v=1"></script>
<script src="connection.js?v=1"></script>
<!-- 타이틀 클릭 B 애니메이션 + 페이지 전환 (양쪽 페이지 공통) -->
<script src="page-nav.js?v=1"></script>

</body>
</html>
