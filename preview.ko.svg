  <!-- Sub-item 1: Read tool -->
  <text x="46" y="207" font-size="10" fill="#858585">17:19:25</text>
  <text x="108" y="207" font-size="10" fill="#6a9955">✓</text>
  <text x="120" y="207" font-size="10" fill="#4ec9b0">Read</text>
  <text x="160" y="207" font-size="10" fill="#d4d4d4">monitor-agent/dashboard.html</text>
  <text x="410" y="207" font-size="10" fill="#858585">17:19:36</text>
  <text x="480" y="207" font-size="10" fill="#c586c0">95ms</text>

  <!-- Sub-item 2: Edit tool -->
  <text x="46" y="224" font-size="10" fill="#858585">17:19:37</text>
  <text x="108" y="224" font-size="10" fill="#6a9955">✓</text>
  <text x="120" y="224" font-size="10" fill="#4ec9b0">Edit</text>
  <text x="160" y="224" font-size="10" fill="#d4d4d4">monitor-agent/dashboard.html</text>
  <text x="410" y="224" font-size="10" fill="#858585">17:19:48</text>
  <text x="480" y="224" font-size="10" fill="#c586c0">210ms</text>

