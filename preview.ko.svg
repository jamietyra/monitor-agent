  <text x="16" y="337" font-size="10" fill="#858585">▶</text>
  <rect x="30" y="325" width="58" height="16" rx="8" fill="#1a3c2d"/>
  <text x="59" y="337" text-anchor="middle" font-size="9" fill="#4ec9b0">API서버</text>
  <text x="96" y="337" font-size="10" fill="#858585">09:45:11</text>
  <text x="160" y="337" font-size="10" fill="#d4d4d4">주문 API 상태 매핑 수정해줘.</text>
