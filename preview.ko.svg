  <text x="42" y="410" font-size="10" fill="#d4d4d4"><tspan fill="#858585">&lt;!</tspan><tspan fill="#569cd6">DOCTYPE</tspan> <tspan fill="#9cdcfe">html</tspan><tspan fill="#858585">&gt;</tspan></text>
  <!-- Line 2 -->
