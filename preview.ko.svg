  <rect x="1160" y="295" width="22" height="16" rx="8" fill="#3c3c3c"/>
  <text x="1171" y="307" text-anchor="middle" font-size="9" fill="#d4d4d4">3</text>

  <!-- ── Prompt Group 3: Collapsed ── -->
