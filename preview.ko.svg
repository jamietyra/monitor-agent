  <text x="830" y="68" font-size="11" fill="#dcdcaa"> 2</text>
  <text x="870" y="68" font-size="11" fill="#858585">완료:</text>
  <text x="910" y="68" font-size="11" fill="#6a9955"> 2,472</text>
  <text x="970" y="68" font-size="11" fill="#858585">에러:</text>
  <text x="1010" y="68" font-size="11" fill="#f44747"> 188</text>
  <text x="1060" y="68" font-size="11" fill="#858585">경과:</text>
  <text x="1100" y="68" font-size="11" fill="#858585"> 150h 30m</text>

