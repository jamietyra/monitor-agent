  <text x="42" y="426" font-size="10" fill="#858585">&lt;<tspan fill="#569cd6">html</tspan> <tspan fill="#9cdcfe">lang</tspan>=<tspan fill="#ce9178">"ko"</tspan>&gt;</text>
  <!-- Line 3 -->
  <text x="30" y="442" font-size="10" fill="#585858" text-anchor="end">849</text>
  <text x="42" y="442" font-size="10" fill="#858585">&lt;<tspan fill="#569cd6">head</tspan>&gt;</text>
  <!-- Line 4 -->
  <text x="30" y="458" font-size="10" fill="#585858" text-anchor="end">850</text>
  <text x="52" y="458" font-size="10" fill="#858585">&lt;<tspan fill="#569cd6">meta</tspan> <tspan fill="#9cdcfe">charset</tspan>=<tspan fill="#ce9178">"UTF-8"</tspan>&gt;</text>
  <!-- Line 5 -->
  <text x="30" y="474" font-size="10" fill="#585858" text-anchor="end">851</text>
  <text x="52" y="474" font-size="10" fill="#858585">&lt;<tspan fill="#569cd6">title</tspan>&gt;<tspan fill="#d4d4d4">monitor-agent</tspan>&lt;/<tspan fill="#569cd6">title</tspan>&gt;</text>
  <!-- Line 6 -->
  <text x="30" y="490" font-size="10" fill="#585858" text-anchor="end">852</text>
  <text x="52" y="490" font-size="10" fill="#858585">&lt;<tspan fill="#569cd6">style</tspan>&gt;</text>
  <!-- Line 7 -->
  <text x="30" y="506" font-size="10" fill="#585858" text-anchor="end">853</text>
  <text x="62" y="506" font-size="10" fill="#d4d4d4"><tspan fill="#d7ba7d">*</tspan> { <tspan fill="#9cdcfe">margin</tspan>: <tspan fill="#b5cea8">0</tspan>; <tspan fill="#9cdcfe">padding</tspan>: <tspan fill="#b5cea8">0</tspan>; <tspan fill="#9cdcfe">box-sizing</tspan>: <tspan fill="#ce9178">border-box</tspan>; }</text>
  <!-- Line 8 -->
  <text x="30" y="522" font-size="10" fill="#585858" text-anchor="end">854</text>
  <text x="62" y="522" font-size="10" fill="#d4d4d4"><tspan fill="#d7ba7d">body</tspan> {</text>
  <!-- Line 9 -->
  <text x="30" y="538" font-size="10" fill="#585858" text-anchor="end">855</text>
  <text x="72" y="538" font-size="10" fill="#d4d4d4"><tspan fill="#9cdcfe">background</tspan>: <tspan fill="#ce9178">#1e1e1e</tspan>;</text>
  <!-- Line 10 -->
  <text x="30" y="554" font-size="10" fill="#585858" text-anchor="end">856</text>
  <text x="72" y="554" font-size="10" fill="#d4d4d4"><tspan fill="#9cdcfe">color</tspan>: <tspan fill="#ce9178">#d4d4d4</tspan>;</text>
  <!-- Line 11 -->
  <text x="30" y="570" font-size="10" fill="#585858" text-anchor="end">857</text>
  <text x="72" y="570" font-size="10" fill="#d4d4d4"><tspan fill="#9cdcfe">font-family</tspan>: <tspan fill="#ce9178">'Consolas'</tspan>, <tspan fill="#ce9178">monospace</tspan>;</text>

  <!-- ══════════ Diff Viewer (Bottom ~25%) ══════════ -->
