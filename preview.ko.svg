<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace">
  <defs>
    <style>
      .bg { fill: #1e1e1e; }
      .panel { fill: #252526; }
      .chrome-bg { fill: #202124; }
      .chrome-addr { fill: #35363a; }
      .border { stroke: #3c3c3c; stroke-width: 1; fill: none; }
    </style>
    <clipPath id="roundClip">
      <rect width="1200" height="700" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" class="bg" rx="8"/>
