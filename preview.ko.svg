  <!-- ══════════ Browser Chrome ══════════ -->
  <rect width="1200" height="25" class="chrome-bg"/>
  <rect x="0" y="17" width="1200" height="8" class="chrome-bg"/>
  <!-- Active tab -->
  <rect x="8" y="4" width="160" height="21" rx="6" fill="#1e1e1e"/>
  <text x="30" y="18" font-size="10" fill="#d4d4d4">monitor-agent</text>
  <text x="152" y="18" font-size="10" fill="#858585">×</text>
