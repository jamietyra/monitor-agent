  <rect x="8" y="304" width="1184" height="22" rx="3" fill="#2a2d2e"/>
  <text x="16" y="319" fill="#858585" font-size="10">&#9654;</text>
  <rect x="32" y="307" width="38" height="16" rx="8" fill="#1a3a5c"/>
  <text x="51" y="319" text-anchor="middle" fill="#569cd6" font-size="9">MAIN</text>
  <text x="78" y="319" fill="#858585" font-size="10">10:15</text>
  <text x="126" y="319" fill="#d4d4d4" font-size="10">Add dark mode toggle to the header component.</text>
