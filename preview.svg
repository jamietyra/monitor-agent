  <text x="120" y="349" fill="#858585" font-size="10">09:45</text>
  <text x="168" y="349" fill="#d4d4d4" font-size="10">Refactor auth middleware for JWT validation.</text>
  <rect x="1152" y="337" width="30" height="16" rx="8" fill="#3c3c3c"/>
  <text x="1167" y="349" text-anchor="middle" fill="#d4d4d4" font-size="9">12</text>

