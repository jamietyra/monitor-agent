<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace">
  <defs>
    <style>
      .bg { fill: #1e1e1e; }
      .panel { fill: #252526; }
      .chrome-bg { fill: #202124; }
      .chrome-addr { fill: #35363a; }
      .border { stroke: #3c3c3c; stroke-width: 1; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" class="bg" rx="8"/>

  <!-- Chrome tab bar -->
  <rect width="1200" height="36" class="chrome-bg" rx="8"/>
  <rect y="28" width="1200" height="8" class="chrome-bg"/>
  <rect x="80" y="8" width="200" height="28" rx="8" fill="#35363a"/>
  <circle cx="96" cy="22" r="6" fill="#569cd6"/>
  <text x="112" y="26" fill="#d4d4d4" font-size="11">monitor-agent</text>
  <text x="264" y="26" fill="#858585" font-size="11">x</text>
  <circle cx="1140" cy="18" r="6" fill="#858585" opacity="0.4"/>
  <circle cx="1160" cy="18" r="6" fill="#858585" opacity="0.4"/>
  <circle cx="1180" cy="18" r="6" fill="#858585" opacity="0.4"/>

  <!-- Address bar -->
