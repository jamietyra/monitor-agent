  <text x="882" y="88" fill="#d4d4d4" font-size="11" font-weight="bold">847</text>
  <text x="930" y="88" fill="#858585" font-size="11">Errors:</text>
  <text x="986" y="88" fill="#f44747" font-size="11" font-weight="bold">3</text>

  <!-- Feeds section -->
  <rect y="101" width="1200" height="20" class="panel"/>
