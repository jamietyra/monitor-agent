  <text x="42" y="420" font-size="10"><tspan fill="#d7ba7d">.feed-panel</tspan><tspan fill="#d4d4d4"> {</tspan></text>

  <text x="30" y="436" text-anchor="end" fill="#585858" font-size="10">15</text>
  <text x="52" y="436" font-size="10"><tspan fill="#9cdcfe">font-size</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#b5cea8">14</tspan><tspan fill="#ce9178">px</tspan><tspan fill="#d4d4d4">;</tspan></text>

  <text x="30" y="452" text-anchor="end" fill="#585858" font-size="10">16</text>
  <text x="52" y="452" font-size="10"><tspan fill="#9cdcfe">line-height</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#b5cea8">1.6</tspan><tspan fill="#d4d4d4">;</tspan></text>

  <text x="30" y="468" text-anchor="end" fill="#585858" font-size="10">17</text>
  <text x="52" y="468" font-size="10"><tspan fill="#9cdcfe">color</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#ce9178">#d4d4d4</tspan><tspan fill="#d4d4d4">;</tspan></text>

  <text x="30" y="484" text-anchor="end" fill="#585858" font-size="10">18</text>
  <text x="52" y="484" font-size="10"><tspan fill="#9cdcfe">padding</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#b5cea8">12</tspan><tspan fill="#ce9178">px</tspan><tspan fill="#d4d4d4">;</tspan></text>

  <text x="30" y="500" text-anchor="end" fill="#585858" font-size="10">19</text>
  <text x="42" y="500" font-size="10"><tspan fill="#d7ba7d">}</tspan></text>

  <text x="30" y="516" text-anchor="end" fill="#585858" font-size="10">20</text>

  <text x="30" y="532" text-anchor="end" fill="#585858" font-size="10">21</text>
  <text x="42" y="532" font-size="10"><tspan fill="#d7ba7d">.header</tspan><tspan fill="#d4d4d4"> {</tspan></text>

  <text x="30" y="548" text-anchor="end" fill="#585858" font-size="10">22</text>
  <text x="52" y="548" font-size="10"><tspan fill="#9cdcfe">display</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#ce9178">flex</tspan><tspan fill="#d4d4d4">;</tspan></text>

  <text x="30" y="564" text-anchor="end" fill="#585858" font-size="10">23</text>
  <text x="52" y="564" font-size="10"><tspan fill="#9cdcfe">align-items</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#ce9178">center</tspan><tspan fill="#d4d4d4">;</tspan></text>

  <text x="30" y="580" text-anchor="end" fill="#585858" font-size="10">24</text>
  <text x="42" y="580" font-size="10"><tspan fill="#d7ba7d">}</tspan></text>

  <!-- Vertical divider -->
  <line x1="599" y1="386" x2="599" y2="666" stroke="#3c3c3c"/>

  <!-- Diff Viewer (right) -->
  <rect x="600" y="386" width="600" height="280" class="bg"/>
  <rect x="600" y="386" width="600" height="18" class="panel"/>
  <line x1="600" y1="404" x2="1200" y2="404" stroke="#3c3c3c"/>
  <text x="614" y="399" fill="#569cd6" font-size="10" font-weight="bold">Diff Viewer</text>
  <text x="740" y="399" fill="#858585" font-size="10">Edit: style.css</text>
  <text x="1186" y="399" text-anchor="end" fill="#858585" font-size="10">10:30</text>

  <!-- Diff: context -->
  <text x="614" y="420" fill="#858585" font-size="10">  .feed-panel {</text>

  <!-- Diff: deleted (red) -->
  <rect x="600" y="424" width="600" height="16" fill="#f44747" opacity="0.1"/>
  <text x="614" y="436" fill="#f44747" font-size="10">-   font-size: 12px;</text>

  <!-- Diff: added (green) -->
  <rect x="600" y="440" width="600" height="16" fill="#6a9955" opacity="0.1"/>
  <text x="614" y="452" fill="#6a9955" font-size="10">+   font-size: 14px;</text>

  <!-- Diff: context lines -->
  <text x="614" y="468" fill="#858585" font-size="10">    line-height: 1.6;</text>
  <text x="614" y="484" fill="#858585" font-size="10">    color: #d4d4d4;</text>
  <text x="614" y="500" fill="#858585" font-size="10">    padding: 12px;</text>
  <text x="614" y="516" fill="#858585" font-size="10">  }</text>

  <!-- Footer -->
