  <line x1="66" y1="162" x2="66" y2="178" stroke="#3c3c3c"/>
  <rect x="76" y="160" width="50" height="20" rx="10" fill="#1a3a5c"/>
  <text x="101" y="174" text-anchor="middle" fill="#569cd6" font-size="10">MAIN</text>
  <rect x="134" y="160" width="70" height="20" rx="10" fill="#2d1a3c"/>
  <text x="169" y="174" text-anchor="middle" fill="#c586c0" font-size="10">WEB-APP</text>
  <rect x="212" y="160" width="90" height="20" rx="10" fill="#1a3c2d"/>
  <text x="257" y="174" text-anchor="middle" fill="#4ec9b0" font-size="10">API-SERVER</text>

  <!-- Expanded prompt group -->
  <rect x="8" y="190" width="1184" height="22" rx="3" fill="#2a2d2e"/>
  <text x="16" y="205" fill="#858585" font-size="10">&#9660;</text>
  <rect x="32" y="193" width="38" height="16" rx="8" fill="#1a3a5c"/>
  <text x="51" y="205" text-anchor="middle" fill="#569cd6" font-size="9">MAIN</text>
  <text x="78" y="205" fill="#858585" font-size="10">10:30</text>
  <text x="126" y="205" fill="#d4d4d4" font-size="10">Increase the font size by 10% across all panels.</text>
