  <rect y="666" width="1200" height="1" fill="#3c3c3c"/>
  <circle cx="20" cy="684" r="4" fill="#4ec9b0"/>
  <text x="30" y="688" fill="#858585" font-size="10">Connected</text>
  <text x="1186" y="688" text-anchor="end" fill="#858585" font-size="10">Actions: 2,662</text>
</svg>