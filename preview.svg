  <text x="48" y="240" fill="#4ec9b0" font-size="10">&#10003;</text>
  <text x="62" y="240" fill="#858585" font-size="10">Edit dashboard/style.css (12 changes)</text>
  <text x="48" y="256" fill="#4ec9b0" font-size="10">&#10003;</text>
  <text x="62" y="256" fill="#858585" font-size="10">Read dashboard/viewer.js</text>
  <text x="48" y="272" fill="#4ec9b0" font-size="10">&#10003;</text>
  <text x="62" y="272" fill="#858585" font-size="10">Edit dashboard/viewer.js</text>

