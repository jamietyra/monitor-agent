<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>monitor-agent</title>
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1e1e1e;
      --bg-panel: #252526;
      --bg-hover: #2a2d2e;
      --text: #d4d4d4;
      --text-dim: #858585;
      --accent: #569cd6;
      --green: #6a9955;
      --yellow: #dcdcaa;
      --red: #f44747;
      --cyan: #4ec9b0;
      --magenta: #c586c0;
      --border: #3c3c3c;
    }

    html { font-size: 110%; }

    body {
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Header ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
    }

    .stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
    }

    .stat-running { color: var(--yellow); }
    .stat-done { color: var(--green); }
    .stat-error { color: var(--red); transition: background 0.3s; border-radius: 3px; padding: 0 4px; }
    .stat-error.flash { background: rgba(244, 71, 71, 0.3); }
    .stat-time { color: var(--text-dim); }

    /* ─── Main Layout (세로 3단 스택) ─── */
    main {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Activity Feed (상단) ─── */
    .activity-panel {
      height: 35%;
      min-height: 120px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .activity-panel h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    .activity-search {
      display: flex;
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .activity-search input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      outline: none;
    }
    .activity-search input:focus { border-color: var(--accent); }
    .activity-search input::placeholder { color: #555; }

    .session-filters {
      display: flex;
      gap: 4px;
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .session-filter-btn {
      font-family: inherit;
      font-size: 9px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid var(--border);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: opacity 0.15s;
      background: transparent;
    }
    .session-filter-btn.active { border-color: transparent; }
    .session-filter-btn:not(.active) { opacity: 0.4; }

    .activity-list {
      flex: 1;
      overflow-y: auto;
      padding: 2px 0;
      font-size: 110%;
    }

    /* ─── Session Tag (프롬프트 왼쪽) ─── */
    .session-tag {
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ─── Prompt Group (접이식) ─── */
    .prompt-group { border-bottom: 1px solid var(--border); }
    .prompt-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      background: var(--bg-panel);
      user-select: none;
      line-height: 1.4;
    }
    .prompt-header:hover { background: var(--bg-hover); }
    .prompt-toggle { color: var(--text-dim); font-size: 9px; flex-shrink: 0; transition: transform 0.15s; }
    .prompt-toggle.collapsed { transform: rotate(-90deg); }
    .prompt-text { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prompt-time { color: var(--text-dim); font-size: 10px; flex-shrink: 0; }
    .prompt-count { color: var(--accent); font-size: 9px; flex-shrink: 0; background: #333; padding: 0 4px; border-radius: 3px; }
    .prompt-tools { overflow: hidden; }
    .prompt-tools.collapsed { display: none; }

    /* ─── Assistant 텍스트 ─── */
    .assistant-text-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 3px 10px 3px 24px;
      font-size: 10px;
      line-height: 1.4;
      color: var(--text-dim);
    }
    .assistant-icon { color: var(--green); flex-shrink: 0; font-size: 10px; }
    .assistant-text { flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 10px 2px 24px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.1s;
      line-height: 1.4;
    }

    .activity-item:hover { background: var(--bg-hover); }
    .activity-item.active { background: var(--bg-hover); border-left: 2px solid var(--accent); }
    .activity-item.error-item { background: rgba(244, 71, 71, 0.08); }

    .activity-icon { width: 12px; text-align: center; flex-shrink: 0; font-size: 10px; }
    .icon-start { color: var(--yellow); }
    .icon-done { color: var(--green); }
    .icon-error { color: var(--red); }

    .activity-time { color: var(--text-dim); font-size: 10px; flex-shrink: 0; }
    .activity-project { color: var(--magenta); font-size: 9px; flex-shrink: 0; background: #333; padding: 0 4px; border-radius: 3px; }
    .activity-name { color: var(--cyan); font-weight: 500; flex-shrink: 0; font-size: 11px; }
    .activity-target { color: var(--text-dim); flex: 1; font-size: 10px; word-break: break-all; }
    .activity-end-time { color: var(--text-dim); font-size: 10px; flex-shrink: 0; margin-left: auto; }
    .activity-duration { color: var(--magenta); font-size: 10px; flex-shrink: 0; margin-left: 4px; }

    /* ─── Content Panel (중단 + 하단) ─── */
    .content-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ─── Code Viewer ─── */
    .code-viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      flex-shrink: 0;
    }

    .code-filename { color: var(--accent); font-weight: 500; }
    .code-info { color: var(--text-dim); }

    .code-content {
      flex: 1;
      overflow: auto;
      background: #1e1e1e;
    }

    .code-content pre {
      margin: 0;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      tab-size: 2;
    }

    .code-content code {
      font-family: inherit;
    }

    .code-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 13px;
      gap: 8px;
      text-align: center;
      padding: 20px;
    }
    .code-placeholder-icon { font-size: 28px; opacity: 0.4; }
    .code-placeholder-sub { font-size: 11px; color: #555; }

    /* ─── Diff Viewer ─── */
    .diff-panel {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      max-height: 40%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .diff-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      flex-shrink: 0;
    }

    .diff-header span { color: var(--accent); font-weight: 500; }

    .diff-content {
      overflow: auto;
      padding: 6px 10px;
      font-size: 11.5px;
      line-height: 1.5;
      font-family: inherit;
    }

    .diff-line-old {
      color: #f44747;
      background: rgba(244, 71, 71, 0.1);
      padding: 1px 4px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .diff-line-new {
      color: #6a9955;
      background: rgba(106, 153, 85, 0.1);
      padding: 1px 4px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .diff-separator {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    /* ─── Browser Viewer ─── */
    .browser-viewer {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      max-height: 40%;
      display: none;
      flex-direction: column;
    }

    .browser-viewer.visible { display: flex; }

    .browser-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      flex-shrink: 0;
    }

    .browser-header span { color: var(--magenta); font-weight: 500; }

    .browser-content {
      overflow: auto;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .browser-content img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* ─── Footer ─── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 20px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .connected { background: var(--green); }
    .disconnected { background: var(--red); }

    /* ─── Resize Handle ─── */
    .resize-handle {
      height: 4px;
      cursor: ns-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .resize-handle:hover, .resize-handle.active { background: var(--accent); }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>

<header>
  <h1>monitor-agent</h1>
  <div class="stats">
    <span class="stat-running" id="stat-running">실행중: 0</span>
    <span class="stat-done" id="stat-done">완료: 0</span>
    <span class="stat-error" id="stat-error">에러: 0</span>
    <span class="stat-time" id="stat-time">경과: --:--</span>
  </div>
</header>

<main>
  <div class="activity-panel">
    <h2>활동 피드</h2>
    <div class="activity-search"><input type="text" id="activity-search" placeholder="검색 (프롬프트, 파일명, 명령어...)"></div>
    <div class="session-filters" id="session-filters"></div>
    <div class="activity-list" id="activity-list"></div>
  </div>

  <div class="resize-handle" id="resize-activity"></div>
  <div class="content-panel">
    <div class="code-viewer">
      <div class="code-header">
        <span class="code-filename" id="code-filename">파일을 선택하세요</span>
        <span class="code-info" id="code-info"></span>
      </div>
      <div class="code-content" id="code-content">
        <div class="code-placeholder">
          <span class="code-placeholder-icon">{ }</span>
          활동 피드에서 파일을 클릭하면 코드가 표시됩니다
          <span class="code-placeholder-sub">Read, Write, Edit 항목 클릭</span>
        </div>
      </div>
    </div>

    <div class="diff-panel" id="diff-panel">
      <div class="diff-header">
        <span id="diff-filename">Diff</span>
        <span class="code-info" id="diff-time"></span>
      </div>
      <div class="diff-content" id="diff-content"><span style="color: var(--text-dim)">Edit 항목 클릭 시 변경 내용이 표시됩니다</span></div>
    </div>

    <div class="browser-viewer" id="browser-viewer">
      <div class="browser-header">
        <span>Browser View</span>
        <span class="code-info" id="screenshot-time"></span>
      </div>
      <div class="browser-content" id="browser-content">
        <span style="color: var(--text-dim)">스크린샷 대기 중...</span>
      </div>
    </div>
  </div>
</main>

<footer>
  <div>
    <span class="connection-dot disconnected" id="connection-dot"></span>
    <span id="connection-status">연결 중...</span>
  </div>
  <span id="event-count" style="color: var(--text-dim); font-size: 10px;"></span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-jsx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-tsx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-csharp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-go.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-rust.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-powershell.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

<script>
(function() {
  // ─── DOM 요소 ─────────────────────────────────────
  const activityList = document.getElementById('activity-list');

  // ─── 패널 리사이즈 ──────────────────────────────────
  (function() {
    const handle = document.getElementById('resize-activity');
    const panel = document.querySelector('.activity-panel');
    let dragging = false;
    handle.addEventListener('mousedown', (e) => {
      dragging = true;
      handle.classList.add('active');
      document.body.style.cursor = 'ns-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const main = document.querySelector('main');
      const rect = main.getBoundingClientRect();
      const pct = ((e.clientY - rect.top) / rect.height) * 100;
      panel.style.height = Math.max(10, Math.min(70, pct)) + '%';
    });
    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });
  })();
  const codeFilename = document.getElementById('code-filename');
  const codeInfo = document.getElementById('code-info');
  const codeContent = document.getElementById('code-content');
  const browserViewer = document.getElementById('browser-viewer');
  const browserContent = document.getElementById('browser-content');
  const screenshotTime = document.getElementById('screenshot-time');
  const diffPanel = document.getElementById('diff-panel');
  const diffFilename = document.getElementById('diff-filename');
  const diffTime = document.getElementById('diff-time');
  const diffContent = document.getElementById('diff-content');
  const connectionDot = document.getElementById('connection-dot');
  const connectionStatus = document.getElementById('connection-status');
  const sessionInfo = document.getElementById('session-info');

  let sessionStart = null;
  let elapsedTimer = null;

  // ─── 세션 필터 버튼 ────────────────────────────────
  const sessionFiltersEl = document.getElementById('session-filters');
  const knownSessions = new Set();
  let activeSessionFilter = null; // null = 전체

  function addSessionFilterBtn(project) {
    const name = project || 'IT';
    if (knownSessions.has(name)) return;
    knownSessions.add(name);

    const btn = document.createElement('button');
    btn.className = 'session-filter-btn active';
    btn.textContent = name;
    const color = getSessionColor(name);
    btn.style.color = color.fg;
    btn.style.background = color.bg;
    btn.dataset.session = name;

    btn.onclick = function() {
      if (activeSessionFilter === name) {
        // 이미 선택된 필터 해제 → 전체 보기
        activeSessionFilter = null;
        sessionFiltersEl.querySelectorAll('.session-filter-btn').forEach(b => b.classList.add('active'));
      } else {
        // 이 세션만 필터
        activeSessionFilter = name;
        sessionFiltersEl.querySelectorAll('.session-filter-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.session === name);
        });
      }
      applyFilters();
    };

    sessionFiltersEl.appendChild(btn);
  }

  // ─── 검색 + 세션 필터 통합 ────────────────────────
  const searchInput = document.getElementById('activity-search');
  searchInput.addEventListener('input', applyFilters);

  function applyFilters() {
    const q = searchInput.value.toLowerCase().trim();
    const groups = activityList.querySelectorAll('.prompt-group');
    for (const group of groups) {
      let show = true;
      // 세션 필터
      if (activeSessionFilter && group.dataset.session !== activeSessionFilter) {
        show = false;
      }
      // 검색어 필터
      if (show && q) {
        const text = group.textContent.toLowerCase();
        if (!text.includes(q)) show = false;
      }
      group.style.display = show ? '' : 'none';
    }
  }

  // ─── 시간 포맷 ────────────────────────────────────
  function formatTime(isoStr) {
    const d = new Date(isoStr);
    return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  }

  function formatDuration(seconds) {
    if (seconds < 1) return Math.round(seconds * 1000) + 'ms';
    if (seconds < 60) return seconds.toFixed(1) + 's';
    const m = Math.floor(seconds / 60);
    const s = Math.round(seconds % 60);
    return m + 'm ' + s + 's';
  }

  function formatElapsed(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    if (h > 0) return h + 'h ' + (m % 60) + 'm';
    return m + 'm ' + (s % 60) + 's';
  }

  // ─── Activity Feed (프롬프트 그룹) ─────────────────
  let currentGroup = null;
  let currentToolsContainer = null;
  let currentToolCount = 0;
  let currentSession = null;

  function collapseCurrentGroup() {
    if (!currentGroup) return;
    const toggle = currentGroup.querySelector('.prompt-toggle');
    const tools = currentGroup.querySelector('.prompt-tools');
    if (toggle) toggle.classList.add('collapsed');
    if (tools) tools.classList.add('collapsed');
  }

  function createGroup(timeStr, text, promptId, project) {
    // 이전 그룹 접기
    collapseCurrentGroup();

    const sessionName = project || 'IT';
    addSessionFilterBtn(sessionName);

    const group = document.createElement('div');
    group.className = 'prompt-group';
    group.dataset.session = sessionName;
    if (promptId) group.dataset.promptId = promptId;

    const header = document.createElement('div');
    header.className = 'prompt-header';

    header.innerHTML = [
      '<span class="prompt-toggle">▼</span>',
      makeSessionTag(project),
      '<span class="prompt-time">' + timeStr + '</span>',
      '<span class="prompt-text">' + escapeHtml(text) + '</span>',
      '<span class="prompt-count">0</span>',
    ].join('');

    const tools = document.createElement('div');
    tools.className = 'prompt-tools';

    header.onclick = function() {
      const toggle = this.querySelector('.prompt-toggle');
      toggle.classList.toggle('collapsed');
      tools.classList.toggle('collapsed');
    };

    group.appendChild(header);
    group.appendChild(tools);
    activityList.appendChild(group);

    currentGroup = group;
    currentToolsContainer = tools;
    currentToolCount = 0;
  }

  const sessionColorCache = {};
  const SESSION_COLORS = [
    { bg: '#1a3a5c', fg: '#569cd6' },
    { bg: '#3c1a1a', fg: '#f44747' },
    { bg: '#2d1a3c', fg: '#c586c0' },
    { bg: '#1a3c2d', fg: '#4ec9b0' },
    { bg: '#3c3a1a', fg: '#dcdcaa' },
    { bg: '#1a3c3c', fg: '#4fc1ff' },
    { bg: '#3c2a1a', fg: '#ce9178' },
    { bg: '#2a1a3c', fg: '#b48ead' },
  ];

  function getSessionColor(project) {
    if (!project) project = 'default';
    if (sessionColorCache[project]) return sessionColorCache[project];
    let hash = 0;
    for (let i = 0; i < project.length; i++) hash = ((hash << 5) - hash + project.charCodeAt(i)) | 0;
    const color = SESSION_COLORS[Math.abs(hash) % SESSION_COLORS.length];
    sessionColorCache[project] = color;
    return color;
  }

  function makeSessionTag(project) {
    const name = project || 'IT';
    const color = getSessionColor(name);
    return '<span class="session-tag" style="background:' + color.bg + ';color:' + color.fg + '">' + escapeHtml(name) + '</span>';
  }

  function ensurePromptGroup(ev) {
    if (ev.type === 'prompt') {
      const timeStr = ev.time ? formatTime(ev.time) : '';
      const previewText = ev.text.replace(/\n/g, ' ').slice(0, 160) || '(프롬프트)';
      createGroup(timeStr, previewText, ev.promptId, ev.project);
      autoScroll();
      return;
    }

    if (!currentGroup) {
      createGroup('', '(이전 작업)', null, ev.project);
    }
  }

  function updateGroupCount() {
    if (!currentGroup) return;
    const countEl = currentGroup.querySelector('.prompt-count');
    if (countEl) countEl.textContent = currentToolCount;
  }

  function autoScroll() {
    const isNearBottom = activityList.scrollHeight - activityList.scrollTop - activityList.clientHeight < 80;
    if (isNearBottom) activityList.scrollTop = activityList.scrollHeight;
  }

  function addActivityItem(ev) {
    // prompt 이벤트 처리
    if (ev.type === 'prompt') {
      ensurePromptGroup(ev);
      return;
    }

    // assistant 텍스트 → 현재 그룹에 추가
    if (ev.type === 'assistant_text') {
      ensurePromptGroup(ev);
      const item = document.createElement('div');
      item.className = 'assistant-text-item';
      const preview = ev.text.replace(/\n/g, ' ').slice(0, 150);
      item.innerHTML = '<span class="assistant-icon">●</span><span class="assistant-text">' + escapeHtml(preview) + '</span>';
      currentToolsContainer.appendChild(item);
      autoScroll();
      return;
    }

    // tool_done/tool_error → 기존 줄 업데이트
    if ((ev.type === 'tool_done' || ev.type === 'tool_error') && ev.id) {
      const existing = document.querySelector('.activity-item[data-tool-id="' + ev.id + '"]');
      if (existing) {
        const iconEl = existing.querySelector('.activity-icon');
        if (ev.type === 'tool_done') {
          iconEl.textContent = '\u2713';
          iconEl.className = 'activity-icon icon-done';
        } else {
          iconEl.textContent = '\u2717';
          iconEl.className = 'activity-icon icon-error';
          existing.classList.add('error-item');
        }
        const endTime = ev.time ? formatTime(ev.time) : '';
        const duration = ev.duration != null ? formatDuration(ev.duration) : '';
        const endTimeEl = existing.querySelector('.activity-end-time');
        if (endTimeEl) endTimeEl.textContent = endTime;
        const durationEl = existing.querySelector('.activity-duration');
        if (durationEl) durationEl.textContent = duration;

        if (ev.filePath && !existing.dataset.filePath) {
          existing.dataset.filePath = ev.filePath;
          existing.style.cursor = 'pointer';
          existing.onclick = function() {
            displayCode._clickedEl = this;
            requestFileContent(ev.filePath);
          };
        }
        return;
      }
    }

    // tool_start → 그룹 안에 새 줄 생성
    if (ev.type !== 'tool_start') return;

    ensurePromptGroup(ev);

    const item = document.createElement('div');
    item.className = 'activity-item';
    if (ev.id) item.dataset.toolId = ev.id;

    if (ev.diff) item._diffData = { filePath: ev.filePath, fileName: ev.target, diff: ev.diff, time: ev.time };

    if (ev.filePath) {
      item.dataset.filePath = ev.filePath;
      item.style.cursor = 'pointer';
      item.onclick = function() {
        displayCode._clickedEl = this;
        requestFileContent(ev.filePath);
        if (this._diffData) displayDiff(this._diffData);
      };
    }

    const timeStr = ev.time ? formatTime(ev.time) : '';
    const target = ev.target || '';

    item.innerHTML = [
      '<span class="activity-time">' + timeStr + '</span>',
      '<span class="activity-icon icon-start">\u25b6</span>',
      '<span class="activity-name">' + escapeHtml(ev.name) + '</span>',
      '<span class="activity-target">' + escapeHtml(target) + '</span>',
      '<span class="activity-end-time"></span>',
      '<span class="activity-duration"></span>',
    ].join('');

    currentToolsContainer.appendChild(item);
    currentToolCount++;
    updateGroupCount();
    autoScroll();
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ─── Code Viewer ──────────────────────────────────
  function displayCode(fileData) {
    codeFilename.textContent = fileData.fileName;
    let info = fileData.totalLines + '줄';
    if (fileData.truncated) info += ' (1500줄까지 표시)';
    codeInfo.textContent = info;

    const pre = document.createElement('pre');
    const code = document.createElement('code');
    code.className = 'language-' + (fileData.language || 'plaintext');
    code.textContent = fileData.content;
    pre.appendChild(code);

    codeContent.innerHTML = '';
    codeContent.appendChild(pre);

    // 500줄 이하만 하이라이트 (성능)
    if (fileData.totalLines <= 500) {
      Prism.highlightElement(code);
    }

    // 클릭된 항목만 강조 (clickedElement가 있을 때만)
    document.querySelectorAll('.activity-item.active').forEach(el => el.classList.remove('active'));
    if (displayCode._clickedEl) {
      displayCode._clickedEl.classList.add('active');
      displayCode._clickedEl = null;
    }
  }

  const fileCache = new Map();

  function requestFileContent(filePath) {
    // 캐시에 있으면 즉시 표시
    const cached = fileCache.get(filePath);
    if (cached) { displayCode(cached); return; }

    // 없으면 서버에 요청
    fetch('/api/file?path=' + encodeURIComponent(filePath))
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data && data.content) {
          fileCache.set(filePath, data);
          displayCode(data);
        }
      })
      .catch(() => {});
  }

  // ─── Diff Viewer ─────────────────────────────────
  function displayDiff(data) {
    diffPanel.classList.add('visible');
    diffFilename.textContent = 'Edit: ' + (data.fileName || '');
    diffTime.textContent = data.time ? formatTime(data.time) : '';

    const lines = [];
    // 삭제된 줄
    if (data.diff.oldString) {
      data.diff.oldString.split('\n').forEach(line => {
        lines.push('<div class="diff-line-old">- ' + escapeHtml(line) + '</div>');
      });
    }
    // 구분선
    lines.push('<hr class="diff-separator">');
    // 추가된 줄
    if (data.diff.newString) {
      data.diff.newString.split('\n').forEach(line => {
        lines.push('<div class="diff-line-new">+ ' + escapeHtml(line) + '</div>');
      });
    }

    diffContent.innerHTML = lines.join('');
  }

  // ─── Browser Viewer ───────────────────────────────
  function displayScreenshot(data) {
    browserViewer.classList.add('visible');
    screenshotTime.textContent = data.time ? formatTime(data.time) : '';
    browserContent.innerHTML = '<img src="/screenshots/' + encodeURIComponent(data.fileName) + '?t=' + Date.now() + '" alt="Browser screenshot">';
  }

  // ─── Stats ────────────────────────────────────────
  function updateStats(stats) {
    document.getElementById('stat-running').textContent = '실행중: ' + (stats.running || 0);
    document.getElementById('stat-done').textContent = '완료: ' + (stats.completed || 0);
    const errorEl = document.getElementById('stat-error');
    const prevErrors = parseInt(errorEl.textContent.replace(/\D/g, '')) || 0;
    const newErrors = stats.errors || 0;
    errorEl.textContent = '에러: ' + newErrors;
    if (newErrors > prevErrors) {
      errorEl.classList.add('flash');
      setTimeout(() => errorEl.classList.remove('flash'), 2000);
    }

    const total = (stats.completed || 0) + (stats.errors || 0) + (stats.running || 0);
    document.getElementById('event-count').textContent = '이벤트: ' + total.toLocaleString() + '개';

    if (stats.sessionStart && !sessionStart) {
      sessionStart = new Date(stats.sessionStart);
      if (!elapsedTimer) {
        elapsedTimer = setInterval(() => {
          const elapsed = Date.now() - sessionStart.getTime();
          document.getElementById('stat-time').textContent = '경과: ' + formatElapsed(elapsed);
        }, 1000);
      }
    }
  }

  // ─── SSE 연결 ─────────────────────────────────────
  function connect() {
    const es = new EventSource('/events');

    es.onopen = () => {
      connectionDot.className = 'connection-dot connected';
      connectionStatus.textContent = '연결됨';
    };

    es.onerror = () => {
      connectionDot.className = 'connection-dot disconnected';
      connectionStatus.textContent = '재연결 중...';
    };

    // 초기 데이터
    es.addEventListener('init', (e) => {
      const data = JSON.parse(e.data);
      // projects 표시 제거됨

      // 최근 이벤트 표시
      if (data.recentEvents) {
        for (const ev of data.recentEvents) {
          addActivityItem(ev);
        }
      }

      if (data.stats) updateStats(data.stats);
      activityList.scrollTop = activityList.scrollHeight;
    });

    // 실시간 활동
    es.addEventListener('activity', (e) => {
      const ev = JSON.parse(e.data);
      addActivityItem(ev);
    });

    // 파일 콘텐츠
    es.addEventListener('file_content', (e) => {
      const fileData = JSON.parse(e.data);
      fileCache.set(fileData.filePath, fileData);
      displayCode(fileData);
    });

    // Diff
    es.addEventListener('file_diff', (e) => {
      const data = JSON.parse(e.data);
      displayDiff(data);
    });

    // 스크린샷
    es.addEventListener('screenshot', (e) => {
      const data = JSON.parse(e.data);
      displayScreenshot(data);
    });

    // 통계
    es.addEventListener('stats', (e) => {
      const stats = JSON.parse(e.data);
      updateStats(stats);
    });

    return es;
  }

  connect();
})();
</script>
